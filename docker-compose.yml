version: '3.9'
services:
  server:
    build: ./server
    ports:
      - '5000:5000'
    environment:
      - MONGO_URI=mongodb://mongo:27017/smart-leads
      - JWT_SECRET=supersecret
      - NODE_ENV=production
    depends_on:
      - mongo

  client:
    build:
      context: ./client
      args:
        VITE_API_URL=http://localhost:5000/api
    ports:
      - '5173:80'
    depends_on:
      - server

  mongo:
    image: mongo:7.0
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
